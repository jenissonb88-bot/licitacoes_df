name: Sniper Pharma (Auditor de Resultados)

# TRAVA DE CONCORRÊNCIA: Mantém a integridade do banco de dados
concurrency:
  group: banco-dados-pharma
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 15,21 * * *'  
  workflow_dispatch: 

jobs:
  auditoria:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install deps
      run: pip install requests

    - name: 🩺 Run Auditor (atualiza.py)
      run: python atualiza.py

    - name: 💾 Commit Auditoria e Relatório
      run: |
        git config user.name "Sniper Pharma Auditor"
        git config user.email "auditor@pharma.bot"
        # Adiciona o banco de dados e o novo relatório CSV
        git add pregacoes_pharma_limpos.json.gz relatorio_atualizacoes.csv || true
        git diff --staged --quiet || git commit -m "Auditoria concluída: Banco atualizado e Relatório gerado"
        git pull origin main --rebase -X theirs
        git push origin main

    - name: 📁 Upload Relatório como Artefacto
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: relatorio-homologacoes
        path: relatorio_atualizacoes.csv
        retention-days: 7

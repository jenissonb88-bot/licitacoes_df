name: Auditoria de Licitações

on:
  schedule:
    - cron: '0 */6 * * *'  # A cada 6 horas
  workflow_dispatch:

jobs:
  auditar:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        pip install requests pandas rapidfuzz

    - name: Verificar integridade dos dados
      run: |
        python -c "
        import json
        import gzip
        from pathlib import Path

        arquivos = list(Path('.').glob('licitacoes_*.json.gz'))
        print(f'Arquivos encontrados: {len(arquivos)}')

        for arq in arquivos[-5:]:  # Últimos 5
            try:
                with gzip.open(arq, 'rt', encoding='utf-8') as f:
                    dados = json.load(f)
                print(f'✅ {arq}: {len(dados)} registros')
            except Exception as e:
                print(f'❌ {arq}: {e}')
        "

    - name: Gerar estatísticas
      run: |
        python -c "
        import pandas as pd
        from pathlib import Path
        import gzip
        import json

        # Carregar relatório mais recente
        relatorios = sorted(Path('.').glob('relatorio_compatibilidade_v3_*.csv'))
        if relatorios:
            df = pd.read_csv(relatorios[-1])
            print('\n📊 Estatísticas do último processamento:')
            print(f'Total de matches: {len(df)}')
            print(f'\nPor tipo de match:')
            print(df['tipo_match'].value_counts())
            print(f'\nTop 10 itens mais compatíveis:')
            print(df.nlargest(10, 'score')[['item_portfolio_id', 'score']])
        else:
            print('Nenhum relatório v3 encontrado')
        "

    - name: Upload de artefatos
      uses: actions/upload-artifact@v4
      with:
        name: relatorios-compatibilidade
        path: relatorio_compatibilidade_*.csv
        retention-days: 30

name: Sniper Pharma (Auditor de Resultados)

concurrency:
  group: auditoria-pncp
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 15,21 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auditoria:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout (rápido)
      uses: actions/checkout@v4.2.2

    - name: Setup Python
      uses: actions/setup-python@v5.5.0
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4.2.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/atualiza.py', '**/avalia_portfolio.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install deps
      run: |
        pip install requests urllib3

    # ✅ CORREÇÃO: Usando 'python -u' para logs em tempo real na tela do GitHub
    - name: 🩺 Run Auditor (atualiza.py)
      run: python -u atualiza.py | tee log_atualizacao.txt

    - name: 📊 Run Avaliação de Portfólio
      if: always()
      run: python -u avalia_portfolio.py | tee log_avaliacao.txt

    - name: 💾 Commit Auditoria
      run: |
        git config user.name "Sniper Pharma Auditor"
        git config user.email "auditor@pharma.bot"

        git add pregacoes_pharma_limpos.json.gz || true
        git add relatorio_compatibilidade_consolidado.csv || true
        
        git rm --cached checkpoint*.json 2>/dev/null || true
        git rm --cached execucao.lock 2>/dev/null || true

        if ! git diff --staged --quiet; then
          git commit -m "🔍 Auditoria e Portfólio: $(date +'%Y-%m-%d %H:%M')"
          git pull origin main --rebase -X theirs || true
          git push origin main || true
        else
          echo "ℹ️ Nenhuma mudança para commitar"
        fi

    - name: 📁 Upload Relatórios como Artefatos
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: relatorios-auditoria-${{ github.run_id }}-$(date +'%Y%m%d')
        path: |
          relatorio_compatibilidade_consolidado.csv
          log_atualizacao.txt
          log_avaliacao.txt
        retention-days: 7
        compression-level: 6

    - name: 📋 Resumo da Execução
      if: always()
      run: |
        echo "=========================================="
        echo "  AUDITORIA E AVALIAÇÃO CONCLUÍDAS"
        echo "=========================================="

        if [ -f log_atualizacao.txt ]; then
          echo ""
          echo "🔄 ATUALIZAÇÃO (Últimas linhas):"
          tail -n 10 log_atualizacao.txt
        fi

        if [ -f log_avaliacao.txt ]; then
          echo ""
          echo "📊 AVALIAÇÃO DE PORTFÓLIO (Últimas linhas):"
          tail -n 10 log_avaliacao.txt
        fi

        echo ""
        echo "📁 ARQUIVOS:"
        ls relatorio_compatibilidade*.csv >/dev/null 2>&1 && echo "   - Compatibilidade: Atualizado com sucesso." || echo "   - Compatibilidade: Nenhum arquivo gerado."

name: Sniper Pharma (Auditor de Resultados)

concurrency:
  group: auditoria-pncp  # ✅ Grupo separado do captura (evita cancelamento)
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 15,21 * * *'  # 15:00 e 21:00 UTC (12:00 e 18:00 Brasília)
  workflow_dispatch:

jobs:
  auditoria:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # ✅ Timeout de segurança (auditoria pode demorar mais)
    permissions:
      contents: write
      actions: write
    
    steps:
    # ✅ Checkout rápido: fetch-depth=1, sem LFS
    - name: Checkout (rápido)
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  # ✅ Apenas último commit - muito mais rápido
        lfs: false

    # ✅ Cache de pip para acelerar instalação
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install deps
      run: |
        pip install requests pandas

    - name: 🩺 Run Auditor (atualiza.py)
      run: python atualiza.py

    - name: 📊 Run Avaliação de Portfólio
      if: always()  # Roda mesmo se atualiza.py falhar
      run: python avalia_portfolio.py

    - name: 💾 Commit Auditoria
      run: |
        git config user.name "Sniper Pharma Auditor"
        git config user.email "auditor@pharma.bot"

        # Adiciona todos os arquivos de dados
        git add pregacoes_pharma_limpos.json.gz || true
        git add relatorio_atualizacoes.csv || true
        git add relatorio_compatibilidade_*.csv || true
        git add log_atualizacao.txt || true
        git add log_captura.txt || true
        
        # Remove arquivos temporários do tracking (se existirem)
        git rm --cached checkpoint*.json 2>/dev/null || true
        git rm --cached execucao.lock 2>/dev/null || true
        git rm --cached checkpoint_atualizacao.json 2>/dev/null || true

        # Só commita se houver mudanças
        if ! git diff --staged --quiet; then
          git commit -m "🔍 Auditoria: $(date +'%Y-%m-%d %H:%M') - Atualização de resultados"
          git pull origin main --rebase -X theirs || true
          git push origin main || true
        else
          echo "ℹ️ Nenhuma mudança para commitar"
        fi

    - name: 📁 Upload Relatórios como Artefatos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: relatorios-auditoria-${{ github.run_id }}-$(date +'%Y%m%d')
        path: |
          relatorio_atualizacoes.csv
          relatorio_compatibilidade_*.csv
          log_atualizacao.txt
          log_captura.txt
        retention-days: 7  # ✅ Reduzido de 30 para economizar espaço
        compression-level: 6

    - name: 📋 Resumo da Execução
      if: always()
      run: |
        echo "=========================================="
        echo "  AUDITORIA E AVALIAÇÃO CONCLUÍDAS"
        echo "=========================================="

        # Resumo da atualização
        if [ -f log_atualizacao.txt ]; then
          echo ""
          echo "🔄 ATUALIZAÇÃO:"
          tail -n 10 log_atualizacao.txt
        fi

        # Resumo da avaliação
        if [ -f log_captura.txt ]; then  # ✅ Nome correto do log
          echo ""
          echo "📊 AVALIAÇÃO DE PORTFÓLIO:"
          tail -n 10 log_captura.txt
        fi

        # Estatísticas dos relatórios
        echo ""
        echo "📁 ARQUIVOS GERADOS:"
        [ -f relatorio_atualizacoes.csv ] && echo "   - Atualizações: $(wc -l < relatorio_atualizacoes.csv) linhas"
        [ -f relatorio_compatibilidade_*.csv ] && echo "   - Compatibilidade: $(ls relatorio_compatibilidade_*.csv | wc -l) arquivo(s)"

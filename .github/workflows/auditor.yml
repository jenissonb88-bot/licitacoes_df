name: Auditoria de Licitações

on:
  schedule:
    - cron: '0 */6 * * *'  # A cada 6 horas
  workflow_dispatch:

jobs:
  auditar:
    runs-on: ubuntu-latest
    
    # O auditor precisa apenas de ler os ficheiros do repositório
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Otimização de tempo

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas rapidfuzz

    - name: Verificar integridade dos dados
      run: |
        python -c "
        import json
        import gzip
        from pathlib import Path

        arquivos = sorted(Path('.').glob('licitacoes_*.json.gz'))
        print(f'Arquivos encontrados: {len(arquivos)}')

        for arq in arquivos[-5:]:  # Últimos 5
            try:
                with gzip.open(arq, 'rt', encoding='utf-8') as f:
                    dados = json.load(f)
                print(f'✅ {arq.name}: {len(dados)} registos validáveis')
            except Exception as e:
                print(f'❌ Falha ao ler {arq.name}: {e}')
        "

    - name: Gerar estatísticas do Portfólio
      run: |
        python -c "
        import pandas as pd
        from pathlib import Path

        relatorios = sorted(Path('.').glob('relatorio_compatibilidade_v3_*.csv'))
        if relatorios:
            try:
                df = pd.read_csv(relatorios[-1])
                print('\n📊 Estatísticas do último processamento de medicamentos:')
                print(f'Total de matches encontrados: {len(df)}')
                print(f'\nPor tipo de match:')
                print(df['tipo_match'].value_counts().to_string())
                print(f'\nTop 10 itens mais compatíveis com o catálogo:')
                print(df.nlargest(10, 'score')[['item_portfolio_id', 'score']].to_string(index=False))
            except Exception as e:
                print(f'Erro ao ler CSV estatístico: {e}')
        else:
            print('Nenhum relatório estatístico (v3) encontrado para processar.')
        "

    - name: Upload de artefatos (Relatórios de Compatibilidade)
      uses: actions/upload-artifact@v4
      with:
        name: relatorios-compatibilidade
        path: relatorio_compatibilidade_*.csv
        retention-days: 30

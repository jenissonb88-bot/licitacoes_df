name: Sniper Pharma (Auditor de Resultados)

concurrency:
  group: auditoria-pncp
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 15,21 * * *' # Executa às 15h e 21h BRT
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auditoria:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout (rápido)
      uses: actions/checkout@v4.2.2

    - name: Setup Python
      uses: actions/setup-python@v5.5.0
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4.2.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/atualiza.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ✅ AJUSTE 1: Instalação super leve (apenas o necessário para o atualiza.py)
    - name: Install deps
      run: |
        pip install requests urllib3

    # ✅ AJUSTE 2: Execução com gravação de Logs para auditoria
    - name: 🩺 1. Run Auditor (atualiza.py)
      run: python atualiza.py | tee log_atualizacao.txt

    # ✅ AJUSTE 3: Avaliação usando o Dicionário de Ouro
    - name: 📊 2. Run Avaliação de Portfólio (avalia_portfolio.py)
      if: always()
      run: python avalia_portfolio.py | tee log_avaliacao.txt

    - name: 💾 Commit Auditoria
      run: |
        git config user.name "Sniper Pharma Auditor"
        git config user.email "auditor@pharma.bot"

        # Adiciona o banco de dados atualizado com vencedores
        git add pregacoes_pharma_limpos.json.gz || true
        # Adiciona o relatório Sniper (Compatibilidade)
        git add relatorio_compatibilidade_consolidado.csv || true
        
        # Remove lixo de execução
        git rm --cached checkpoint*.json 2>/dev/null || true
        git rm --cached execucao.lock 2>/dev/null || true

        if ! git diff --staged --quiet; then
          git commit -m "🔍 Auditoria e Portfólio: $(date +'%Y-%m-%d %H:%M')"
          git pull origin main --rebase -X theirs || true
          git push origin main || true
        else
          echo "ℹ️ Nenhuma homologação nova encontrada para atualizar."
        fi

    - name: 📁 Upload Artefatos (Logs de Auditoria)
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: relatorios-auditoria-${{ github.run_id }}
        path: |
          relatorio_compatibilidade_consolidado.csv
          log_atualizacao.txt
          log_avaliacao.txt
        retention-days: 7
        compression-level: 6

    - name: 📋 Resumo Visual
      if: always()
      run: |
        echo "=========================================="
        echo "  AUDITORIA E AVALIAÇÃO CONCLUÍDAS"
        echo "=========================================="
        [ -f log_atualizacao.txt ] && tail -n 5 log_atualizacao.txt
        [ -f log_avaliacao.txt ] && tail -n 5 log_avaliacao.txt

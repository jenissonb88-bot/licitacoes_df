name: Sniper Pharma (Auditor)

# ✅ BLOQUEIO GLOBAL: Usa o mesmo nome do grupo da captura
# Isso garante que NUNCA rodem simultaneamente.
concurrency:
  group: sniper-pharma-sync
  cancel-in-progress: false 

on:
  schedule:
    - cron: '0 15,21 * * *' # Roda em horários diferentes da captura
  workflow_dispatch:

jobs:
  auditoria:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2

    - name: Setup Python
      uses: actions/setup-python@v5.5.0
      with:
        python-version: '3.11'

    - name: Install deps
      run: pip install requests urllib3

    - name: 🩺 1. Run Auditor (atualiza.py)
      # Mantendo o -u para você ver os logs em tempo real
      run: python -u atualiza.py | tee log_auditoria.txt

    - name: 💾 Commit Auditoria
      if: success()
      run: |
        git config user.name "Sniper Pharma Auditor"
        git config user.email "auditor@pharma.bot"

        git add pregacoes_pharma_limpos.json.gz
        
        if ! git diff --staged --quiet; then
          git commit -m "🔍 Auditoria: Vencedores atualizados [$(date +'%H:%M')]"
          git pull origin main --rebase -X theirs || true
          git push origin main
        else
          echo "ℹ️ Nenhuma nova homologação encontrada."
        fi

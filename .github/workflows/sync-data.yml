name: Sniper Pharma (Captura)

concurrency:
  group: captura-pncp
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de Execução'
        required: true
        default: 'manual_loop'
        type: choice
        options:
        - manual_loop
        - single_run
      target_date:
        description: 'Data Alvo (YYYY-MM-DD)'
        required: false
        default: '2026-01-01'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extracao_e_limpeza:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout (rápido)
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 1

    - name: Setup Python
      uses: actions/setup-python@v5.5.0
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4.2.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/app.py', '**/limpeza.py', '**/avalia_portfolio.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ✅ CORREÇÃO: Removido pandas e numpy (Acelerando o servidor)
    - name: Install deps
      run: |
        pip install requests urllib3

    - name: Definir Datas e Modo
      id: config
      run: |
        export TZ="America/Sao_Paulo"
        TODAY=$(date +'%Y-%m-%d')
        if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "START_DATE=$(date -d '6 days ago' +'%Y-%m-%d')" >> $GITHUB_ENV
            echo "END_DATE=$TODAY" >> $GITHUB_ENV
            echo "MODE=single_run" >> $GITHUB_ENV
        else
            echo "START_DATE=${{ inputs.target_date }}" >> $GITHUB_ENV
            echo "END_DATE=${{ inputs.target_date }}" >> $GITHUB_ENV
            echo "MODE=${{ inputs.mode }}" >> $GITHUB_ENV
        fi

    # ✅ CORREÇÃO: Gerando logs de tela com 'tee'
    - name: 🚀 1. Run Core Crawler (app.py)
      run: python app.py --start "$START_DATE" --end "$END_DATE" | tee log_crawler.txt

    - name: 🧹 2. Run Data Cleaner (limpeza.py)
      run: python limpeza.py | tee log_limpeza.txt

    - name: 📊 3. Run Avaliação de Portfólio (avalia_portfolio.py)
      if: always()
      run: python avalia_portfolio.py | tee log_avaliacao.txt

    - name: 💾 Commit Resultados
      run: |
        git config user.name "Sniper Pharma Bot"
        git config user.email "sniper@pharma.bot"

        git add dadosoportunidades.json.gz || true
        git add pregacoes_pharma_limpos.json.gz || true
        git add relatorio_compatibilidade_consolidado.csv || true
        
        git rm --cached checkpoint*.json 2>/dev/null || true
        git rm --cached execucao.lock 2>/dev/null || true

        if ! git diff --staged --quiet; then
          git commit -m "📊 Captura PNCP: $START_DATE a $END_DATE [$(date +'%H:%M')]"
          git pull origin main --rebase -X theirs || true
          git push origin main || true
        else
          echo "ℹ️ Nenhuma mudança para commitar"
        fi

    - name: 🔁 Trigger Próximo Dia (Loop)
      if: env.MODE == 'manual_loop'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        NEXT_DAY=$(date -d "$START_DATE + 1 day" +'%Y-%m-%d')
        TODAY=$(date +'%Y-%m-%d')

        if [[ "$NEXT_DAY" < "$TODAY" ]] || [[ "$NEXT_DAY" == "$TODAY" ]]; then
           echo "🚀 Disparando o robô para o dia $NEXT_DAY..."
           gh workflow run "Sniper Pharma (Captura)" -f mode="manual_loop" -f target_date="$NEXT_DAY"
        else
           echo "🏁 Loop finalizado. O robô alcançou o dia de hoje."
        fi

    - name: 📁 Upload Artefatos
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: captura-pncp-${{ github.run_id }}-${{ env.START_DATE }}
        path: |
          relatorio_compatibilidade_consolidado.csv
          log_crawler.txt
          log_limpeza.txt
          log_avaliacao.txt
          pregacoes_pharma_limpos.json.gz
        retention-days: 7
        compression-level: 6

name: Sniper Pharma (Captura)

concurrency:
  group: captura-pncp
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Data inicial (YYYY-MM-DD)'
        required: false
        default: ''
      end_date:
        description: 'Data final (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  extracao_e_limpeza:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout (rápido)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # ✅ Otimizado: só último commit
          lfs: false
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install requests pandas
      
      - name: Run app.py (Captura)
        run: |
          python app.py --start ${{ github.event.inputs.start_date || '' }} --end ${{ github.event.inputs.end_date || '' }}
      
      - name: Run limpeza.py (Limpeza)
        run: |
          python limpeza.py
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dados-processados
          path: |
            dadosoportunidades.json.gz
            pregacoes_pharma_limpos.json.gz
            log_captura.txt
          retention-days: 7
      
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dadosoportunidades.json.gz pregacoes_pharma_limpos.json.gz log_captura.txt
          git diff --staged --quiet || git commit -m "🤖 Atualização automática - $(date +'%Y-%m-%d %H:%M')"
          git push

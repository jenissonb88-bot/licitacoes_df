name: Sniper Pharma (Captura)

# ✅ BLOQUEIO DE SEGURANÇA: 
# Impede que dois robôs rodem ao mesmo tempo. 
# Se um novo for disparado, ele fica na fila (pending) esperando o atual terminar.
concurrency:
  group: sniper-pharma-capture
  cancel-in-progress: false 

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de Execução'
        required: true
        default: 'manual_loop'
        type: choice
        options:
        - manual_loop
        - single_run
      target_date:
        description: 'Data Alvo (YYYY-MM-DD)'
        required: false
        default: '2026-02-01'

jobs:
  extracao_e_limpeza:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Tempo limite aumentado para garantir segurança
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout (rápido)
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 1

    - name: Setup Python
      uses: actions/setup-python@v5.5.0
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4.2.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/app.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install deps
      run: pip install requests urllib3

    - name: Definir Datas e Modo
      id: config
      run: |
        export TZ="America/Sao_Paulo"
        TODAY=$(date +'%Y-%m-%d')
        
        if [ "${{ github.event_name }}" == "schedule" ]; then
            # No automático diário, roda sempre o dia atual
            echo "START_DATE=$TODAY" >> $GITHUB_ENV
            echo "END_DATE=$TODAY" >> $GITHUB_ENV
            echo "MODE=single_run" >> $GITHUB_ENV
        else
            # MODO MANUAL/LOOP: Confia 100% na data que você digitou no GitHub!
            echo "START_DATE=${{ inputs.target_date }}" >> $GITHUB_ENV
            echo "END_DATE=${{ inputs.target_date }}" >> $GITHUB_ENV
            echo "MODE=${{ inputs.mode }}" >> $GITHUB_ENV
        fi

    - name: 🚀 1. Run Core Crawler (app.py)
      run: python -u app.py --start "$START_DATE" --end "$END_DATE"

    - name: 🧹 2. Run Data Cleaner (limpeza.py)
      run: python -u limpeza.py

    - name: 📊 3. Run Avaliação de Portfólio (avalia_portfolio.py)
      if: success() # Só roda se os passos anteriores derem certo
      run: python -u avalia_portfolio.py

    - name: 💾 Commit e Atualiza Checkpoint
      if: success()
      run: |
        git config user.name "Sniper Pharma Bot"
        git config user.email "sniper@pharma.bot"

        # Calcula o próximo dia para gravar no log visualmente
        NEXT_DAY=$(date -d "$START_DATE + 1 day" +'%Y-%m-%d')
        echo $NEXT_DAY > checkpoint.txt

        git add checkpoint.txt dadosoportunidades.json.gz pregacoes_pharma_limpos.json.gz relatorio_compatibilidade_consolidado.csv
        
        if ! git diff --staged --quiet; then
          git commit -m "📊 Captura concluída: $START_DATE | Próximo: $NEXT_DAY"
          git pull origin main --rebase -X theirs || true
          git push origin main
        fi

    - name: 🔁 Trigger Próximo Dia (Fila de Segurança)
      # Só dispara se o modo for loop E o passo de commit terminou com sucesso
      if: env.MODE == 'manual_loop' && success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Calcula qual é o próximo dia com base no dia que acabou de rodar (Ignorando o ficheiro de texto)
        NEXT_DAY=$(date -d "$START_DATE + 1 day" +'%Y-%m-%d')
        TODAY=$(date +'%Y-%m-%d')

        if [[ "$NEXT_DAY" < "$TODAY" ]] || [[ "$NEXT_DAY" == "$TODAY" ]]; then
           echo "🚀 Ciclo de segurança: Disparando dia $NEXT_DAY..."
           # Usamos a CLI do GitHub para disparar o próximo com a nova data calculada
           gh workflow run "Sniper Pharma (Captura)" -f mode="manual_loop" -f target_date="$NEXT_DAY"
        else
           echo "🏁 Meta alcançada: Robô atualizado até hoje."
        fi

name: Sincronização de Licitações PNCP

on:
  schedule:
    - cron: '0 6 * * *'  # Executa diariamente às 6h
  workflow_dispatch:  # Permite execução manual

env:
  PYTHONUNBUFFERED: 1

jobs:
  capturar-licitacoes:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        pip install requests pandas rapidfuzz

    - name: Executar captura (app.py)
      run: python app.py
      env:
        PNCP_API_TOKEN: ${{ secrets.PNCP_API_TOKEN }}

    - name: Executar limpeza
      run: python limpeza.py

    - name: Avaliar portfólio (v3 - Híbrido)
      run: python avalia_portfolio.py

    - name: Atualizar status
      run: python atualiza.py

    - name: Commit e push dos resultados
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --quiet && git diff --staged --quiet || git commit -m "Atualização diária: $(date +%Y-%m-%d)"
        git push

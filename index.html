<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLETA PNCP | Analista de Licitações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="container mx-auto p-6">
        <header class="flex justify-between items-center mb-8 border-b pb-4">
            <h1 class="text-2xl font-bold text-blue-900"><i class="fa-solid fa-microscope mr-2"></i>COLETA PNCP - Saúde</h1>
            <button onclick="abrirManual()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                <i class="fa-solid fa-plus mr-2"></i>Inclusão Manual
            </button>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-sm mb-6 border border-gray-200">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="uf" placeholder="UF (Ex: SP)" class="border p-2 rounded">
                <input type="text" id="cidade" placeholder="Cidade" class="border p-2 rounded">
                <input type="text" id="orgao" placeholder="Nome do Órgão" class="border p-2 rounded">
                <input type="text" id="edital" placeholder="Nº do Edital" class="border p-2 rounded">
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="buscar()" class="bg-blue-800 text-white px-6 py-2 rounded hover:bg-blue-900">Buscar</button>
                <button onclick="limpar()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded hover:bg-gray-300">Limpar</button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden border border-gray-200">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-4 border-b">Data</th>
                        <th class="p-4 border-b">Órgão</th>
                        <th class="p-4 border-b">Objeto</th>
                        <th class="p-4 border-b">Fonte / Ação</th>
                        <th class="p-4 border-b text-center">Gestão</th>
                    </tr>
                </thead>
                <tbody id="resultado-corpo">
                    </tbody>
            </table>
        </div>
        
        <div id="paginacao" class="mt-4 flex justify-center gap-2"></div>
    </div>

    <script>
        async function buscar(pagina = 1) {
            const res = await fetch(`/buscar?uf=${document.getElementById('uf').value}&pagina=${pagina}`);
            const data = await res.json();
            const corpo = document.getElementById('resultado-corpo');
            corpo.innerHTML = '';

            data.dados.forEach(item => {
                corpo.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-4 text-sm">${new Date(item.data).toLocaleDateString()}</td>
                        <td class="p-4 font-semibold text-sm">${item.orgao}</td>
                        <td class="p-4 text-sm truncate max-w-xs">${item.objeto}</td>
                        <td class="p-4">
                            <div class="flex items-center gap-2">
                                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded font-bold">${item.fonte}</span>
                                <button onclick="verItens('${item.cnpj}', '${item.ano}', '${item.sequencial}')" class="text-blue-600 hover:underline text-sm font-medium">
                                    <i class="fa-solid fa-list-check"></i> Detalhar Itens
                                </button>
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="excluir('${item.numero}')" class="text-red-500 hover:text-red-700">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function excluir(id) {
            if(confirm('Deseja descartar esta licitação?')) {
                // Lógica de exclusão lógica no BD ou Array
                buscar();
            }
        }

        // Funções adicionais de modal e paginação seriam implementadas aqui
    </script>
</body>
</html>

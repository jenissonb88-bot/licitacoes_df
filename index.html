<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Pharma - Painel de Licitações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root { --blue-df: #004a99; --green-df: #198754; --red-df: #dc3545; --yellow-df: #ffc107; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; color: #333; font-size: 0.92rem; }

        .header-card { 
            background: linear-gradient(90deg, #002d5a 0%, #004a99 100%); 
            color: white; padding: 12px 20px; border-radius: 10px 10px 0 0; font-size: 1.05rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-bold { font-weight: 700; }
        .badge-uf-header { background-color: #000; color: #fff; font-weight: 800; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }

        .card-licitacao { border-radius: 10px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; overflow: hidden; background: white; }
        .filter-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid #e0e6ed; margin-bottom: 20px; }
        .filter-label { font-size: 0.65rem; font-weight: 800; color: var(--blue-df); margin-bottom: 2px; display: block; text-transform: uppercase; }

        .table-itens { font-size: 0.82em; margin-bottom: 0; }
        .header-fornecedor { background-color: #f8f9fa; color: var(--blue-df); font-weight: bold; }
        .header-status-andamento { background-color: #fff9db; font-weight: bold; color: #856404; text-align: center; }
        .header-status-deserto { background-color: #f8d7da; font-weight: bold; color: #721c24; text-align: center; }
        .header-status-cancelado { background-color: #e2e3e5; font-weight: bold; color: #383d41; text-align: center; }

        .pagination-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; padding-bottom: 40px; flex-wrap: wrap; }
        .page-info-text { font-size: 0.875rem; color: #666; font-weight: 600; }

        .btn-excluir { font-size: 0.7rem; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .btn-excluir:hover { background: var(--red-df); border-color: var(--red-df); }
    </style>
</head>
<body>

<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="fw-bold mb-0" style="color: #003366;">🔭 Sniper Pharma Monitor</h3>
            <span class="badge bg-dark" style="font-size: 0.7rem;">ANALISTA DE LICITAÇÕES | PNCP & COMPRASGOV</span>
        </div>
        <button class="btn btn-success fw-bold" onclick="abrirInclusaoManual()">+ Inclusão Manual (PNCP)</button>
    </div>

    <div class="filter-box shadow-sm">
        <div class="row g-2">
            <div class="col-md-2">
                <label class="filter-label">UF</label>
                <input type="text" id="filterUF" class="form-control form-control-sm" placeholder="Ex: PE" oninput="filtrar()">
            </div>
            <div class="col-md-2">
                <label class="filter-label">CIDADE</label>
                <input type="text" id="filterCidade" class="form-control form-control-sm" placeholder="Busque a cidade..." oninput="filtrar()">
            </div>
            <div class="col-md-3">
                <label class="filter-label">ÓRGÃO / CÓDIGO</label>
                <input type="text" id="filterOrgao" class="form-control form-control-sm" placeholder="Nome ou UASG" oninput="filtrar()">
            </div>
            <div class="col-md-3">
                <label class="filter-label">Nº EDITAL</label>
                <input type="text" id="filterEdital" class="form-control form-control-sm" placeholder="00000/2026" oninput="filtrar()">
            </div>
            <div class="col-md-2 d-flex align-items-end gap-2">
                <button class="btn btn-sm btn-primary w-100 fw-bold" onclick="filtrar()">BUSCAR</button>
                <button class="btn btn-sm btn-outline-secondary w-100 fw-bold" onclick="limparFiltros()">LIMPAR</button>
            </div>
        </div>
    </div>

    <div id="loading" class="text-center py-4" style="display: none;">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-2 fw-bold text-primary">A carregar oportunidades...</div>
    </div>
    
    <div id="monitorContainer"></div>

    <div class="pagination-container" id="pagination">
        <button class="btn btn-outline-primary btn-sm fw-bold" onclick="mudarPagina(-1)">Anterior</button>
        <span class="page-info-text" id="pageInfo">Página 1 de 1</span>
        <button class="btn btn-outline-primary btn-sm fw-bold" onclick="mudarPagina(1)">Próxima</button>
    </div>
</div>

<script>
    let dadosCompletos = [];
    let dadosFiltrados = [];
    let compatibilidadeData = {};
    let paginaAtual = 1;
    const itensPorPagina = 20;

    // --- MÓDULO DE COMPATIBILIDADE PORTFÓLIO ---
    async function carregarCompatibilidade() {
        try {
            const response = await fetch('compatibilidade_latest.csv');
            if (!response.ok) {
                console.warn('CSV de compatibilidade não encontrado.');
                return;
            }
            const csvText = await response.text();
            
            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        const id = row.licitacao_id;
                        if (!compatibilidadeData[id]) {
                            compatibilidadeData[id] = [];
                        }
                        compatibilidadeData[id].push(row);
                    });
                    console.log("✅ Compatibilidade Carregada. Matches encontrados:", Object.keys(compatibilidadeData).length);
                }
            });
        } catch (error) {
            console.warn("⚠️ Módulo de compatibilidade ignorado:", error.message);
        }
    }

    function gerarHtmlCompatibilidade(licitacaoId) {
        const matches = compatibilidadeData[licitacaoId];
        if (!matches || matches.length === 0) return ''; 

        let html = `<div class="mt-3 p-3 border rounded shadow-sm" style="background-color: #eaf4fb; border-color: #b8daff !important;">
                        <h6 class="text-primary mb-2 fw-bold">🎯 Oportunidades Encontradas no Portfólio</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-bordered mb-0 bg-white text-center align-middle" style="font-size: 0.85rem;">
                                <thead class="table-light">
                                    <tr>
                                        <th>Cód. Produto</th>
                                        <th class="text-start">Descrição no Catálogo</th>
                                        <th>Grau de Match</th>
                                        <th>Classificação</th>
                                    </tr>
                                </thead>
                                <tbody>`;
        
        matches.forEach(m => {
            let badgeClass = m.tipo_match === 'ALTO' ? 'bg-success' : 'bg-warning text-dark';
            html += `<tr>
                        <td><strong>${m.item_portfolio_id}</strong></td>
                        <td class="text-start text-dark fw-semibold">${m.descricao_portfolio}</td>
                        <td><strong>${m.score}</strong></td>
                        <td><span class="badge ${badgeClass}">${m.tipo_match}</span></td>
                     </tr>`;
        });

        html += `       </tbody>
                    </table>
                    </div>
                </div>`;
        return html;
    }

    // --- MÓDULO DE CARREGAMENTO E RENDERIZAÇÃO ---
    async function iniciarPainel() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('monitorContainer').style.display = 'none';

        await carregarCompatibilidade();

        try {
            // Busca o JSON da sua automação (Ajuste o nome do ficheiro se necessário)
            const response = await fetch('dados_painel_final_latest.json');
            if (response.ok) {
                const json = await response.json();
                dadosCompletos = json.licitacoes || json; // Aceita tanto array direto quanto objeto aninhado
            } else {
                console.warn("A usar ficheiro de fallback (pregacoes_pharma_limpos)...");
                // Fallback para o ficheiro limpo
                const fallbackResponse = await fetch('pregacoes_pharma_limpos.json');
                dadosCompletos = await fallbackResponse.json();
            }
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
            document.getElementById('monitorContainer').innerHTML = `<div class="alert alert-danger">Falha ao carregar os dados. Verifique se os ficheiros JSON existem.</div>`;
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('monitorContainer').style.display = 'block';
        limparFiltros(); // Inicializa a filtragem e a renderização
    }

    function renderizarTabelaItens(itens) {
        if (!itens || itens.length === 0) return `<div class="text-muted small mt-2">Nenhum item detalhado disponível.</div>`;

        const andamento = [], desertos = [], cancelados = [], gruposHomologados = {};

        itens.forEach(it => {
            if (it.status_item === "HOMOLOGADO" && it.fornecedor_vencedor) {
                if (!gruposHomologados[it.fornecedor_vencedor]) gruposHomologados[it.fornecedor_vencedor] = [];
                gruposHomologados[it.fornecedor_vencedor].push(it);
            } else if (it.status_item === "CANCELADO" || it.status_item === "ANULADO") {
                cancelados.push(it);
            } else if (it.status_item === "DESERTO" || it.status_item === "FRACASSADO") {
                desertos.push(it);
            } else {
                andamento.push(it);
            }
        });

        let html = `<div class="table-responsive mt-3"><table class="table table-sm table-bordered table-itens">`;
        html += `<thead class="table-dark text-center"><tr><th>Item</th><th class="text-start">Descrição</th><th>Situação</th><th>Valor Final</th></tr></thead><tbody>`;

        // Itens Homologados Agrupados por Fornecedor
        for (const [fornecedor, lista] of Object.entries(gruposHomologados)) {
            html += `<tr><td colspan="4" class="header-fornecedor">🏆 Fornecedor: ${fornecedor}</td></tr>`;
            lista.forEach(it => {
                html += `<tr>
                    <td class="text-center"><strong>${it.numero_item}</strong></td>
                    <td>${it.descricao || '---'}</td>
                    <td class="text-center"><span class="badge bg-success">HOMOLOGADO</span></td>
                    <td class="text-center text-success fw-bold">R$ ${it.valor_final || '---'}</td>
                </tr>`;
            });
        }

        // Itens em Andamento
        if (andamento.length > 0) {
            html += `<tr><td colspan="4" class="header-status-andamento">⏳ Em Andamento / Divulgado</td></tr>`;
            andamento.forEach(it => html += renderLinhaPadrao(it, "bg-warning text-dark", "ANDAMENTO"));
        }

        // Itens Desertos
        if (desertos.length > 0) {
            html += `<tr><td colspan="4" class="header-status-deserto">⚠️ Desertos / Fracassados</td></tr>`;
            desertos.forEach(it => html += renderLinhaPadrao(it, "bg-danger", "DESERTO"));
        }

        // Itens Cancelados
        if (cancelados.length > 0) {
            html += `<tr><td colspan="4" class="header-status-cancelado">🚫 Cancelados / Anulados</td></tr>`;
            cancelados.forEach(it => html += renderLinhaPadrao(it, "bg-secondary", "CANCELADO"));
        }

        html += `</tbody></table></div>`;
        return html;
    }

    function renderLinhaPadrao(it, badgeClass, label) {
        return `<tr>
            <td class="text-center"><strong>${it.numero_item || it.numeroItem || '-'}</strong></td>
            <td>${it.descricao || '---'}</td>
            <td class="text-center"><span class="badge ${badgeClass}">${label}</span></td>
            <td class="text-center text-muted">Est. R$ ${it.valor_estimado || '---'}</td>
        </tr>`;
    }

    function renderizarPainel() {
        const container = document.getElementById('monitorContainer');
        container.innerHTML = '';

        const inicio = (paginaAtual - 1) * itensPorPagina;
        const fim = inicio + itensPorPagina;
        const paginaDados = dadosFiltrados.slice(inicio, fim);

        if (paginaDados.length === 0) {
            container.innerHTML = `<div class="alert alert-info text-center mt-4">Nenhuma licitação encontrada para os filtros atuais.</div>`;
            document.getElementById('pageInfo').innerText = `Página 0 de 0`;
            return;
        }

        paginaDados.forEach(lic => {
            // Compatibilidade com chaves diferentes (dados brutos vs dados do atualiza.py)
            const idLicitacao = lic.chave || (lic.id + '_' + lic.edit);
            
            const card = document.createElement('div');
            card.className = 'card-licitacao';
            
            card.innerHTML = `
                <div class="header-card"> 
                    <div> 
                        <span class="badge-uf-header">${lic.uf || 'BR'}</span> 
                        <span class="header-bold">${lic.org || lic.orgao_nome || 'Órgão não informado'}</span> 
                        <span class="ms-2 opacity-75 small">| Edital: ${lic.edit || lic.numero_edital || idLicitacao}</span> 
                    </div> 
                    <button class="btn-excluir" onclick="excluirLicitacao('${idLicitacao}')">Ocultar</button> 
                </div> 
                <div class="card-body py-3 px-4"> 
                    <div class="row"> 
                        <div class="col-md-12"> 
                            <small class="text-muted d-block mb-1">${lic.cid || lic.municipio || '---'} | Status Global: <span class="fw-bold">${lic.status_global || '---'}</span></small> 
                            <h6 class="fw-bold mb-1" style="color: #212529;">${lic.obj || lic.objeto || 'Sem descrição do objeto'}</h6> 
                            <div class="d-flex gap-2 mt-2"> 
                                <span class="badge bg-secondary">Criado/Enc: ${lic.data_publicacao || lic.dt_enc || '---'}</span> 
                                <span class="badge bg-light text-dark border">Valor Estimado: R$ ${lic.valor_total_estimado || lic.valor_estimado || '---'}</span> 
                                ${lic.link_pncp ? `<a href="${lic.link_pncp}" target="_blank" class="badge bg-primary text-decoration-none">Ver no PNCP ↗</a>` : ''}
                            </div> 
                            
                            ${gerarHtmlCompatibilidade(idLicitacao)}

                            ${renderizarTabelaItens(lic.itens_atualizados || lic.itens)}
                        </div> 
                    </div> 
                </div>
            `;
            container.appendChild(card);
        });

        const totalPaginas = Math.ceil(dadosFiltrados.length / itensPorPagina);
        document.getElementById('pageInfo').innerText = `Página ${paginaAtual} de ${totalPaginas}`;
    }

    // --- MÓDULOS DE CONTROLE E FILTROS ---
    function filtrar() {
        const uf = document.getElementById('filterUF').value.toUpperCase();
        const cid = document.getElementById('filterCidade').value.toUpperCase();
        const org = document.getElementById('filterOrgao').value.toUpperCase();
        const edi = document.getElementById('filterEdital').value.toUpperCase();

        dadosFiltrados = dadosCompletos.filter(lic => {
            const matchUF = !(uf) || (lic.uf || '').toUpperCase().includes(uf);
            const matchCid = !(cid) || (lic.cid || lic.municipio || '').toUpperCase().includes(cid);
            const matchOrg = !(org) || (lic.org || lic.orgao_nome || '').toUpperCase().includes(org);
            const matchEdi = !(edi) || (lic.edit || lic.numero_edital || '').toUpperCase().includes(edi);
            
            return matchUF && matchCid && matchOrg && matchEdi;
        });

        paginaAtual = 1;
        renderizarPainel();
    }

    function limparFiltros() {
        document.getElementById('filterUF').value = '';
        document.getElementById('filterCidade').value = '';
        document.getElementById('filterOrgao').value = '';
        document.getElementById('filterEdital').value = '';
        filtrar();
    }

    function mudarPagina(delta) {
        const totalPaginas = Math.ceil(dadosFiltrados.length / itensPorPagina);
        const novaPagina = paginaAtual + delta;
        
        if (novaPagina >= 1 && novaPagina <= totalPaginas) {
            paginaAtual = novaPagina;
            renderizarPainel();
            window.scrollTo(0, 0);
        }
    }

    function excluirLicitacao(id) {
        if(confirm("Deseja realmente ocultar esta licitação?")) {
            dadosCompletos = dadosCompletos.filter(lic => (lic.chave || lic.id + '_' + lic.edit) !== id);
            filtrar();
        }
    }

    function abrirInclusaoManual() {
        const url = prompt("Cole aqui o link do PNCP da licitação que deseja incluir manualmente:");
        if(url) {
            alert("Aviso: O link foi registado. Na próxima execução do robô (GitHub Actions), esta licitação será puxada e aparecerá aqui no painel.");
            // Aqui você pode adicionar a lógica de enviar o link para o github, caso tenha o token no front
        }
    }

    // Boot
    window.onload = iniciarPainel;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Pharma - Painel de Licitações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --blue-df: #004a99; --green-df: #198754; --red-df: #dc3545; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; font-size: 0.9rem; }
        .header-card { background: linear-gradient(90deg, #002d5a, #004a99); color: white; padding: 12px; border-radius: 8px 8px 0 0; }
        .badge-uf { background: #000; color: #fff; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .card-licitacao { border-radius: 8px; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        /* Badges de ME/EPP solicitadas */
        .benef-sim { background-color: #dc3545; color: white !important; padding: 2px 8px; border-radius: 4px; font-weight: 800; font-size: 0.75rem; }
        .benef-nao { background-color: #198754; color: white !important; padding: 2px 8px; border-radius: 4px; font-weight: 800; font-size: 0.75rem; }
        
        .badge-tipo { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; }
        .badge-amplo { background: var(--green-df); color: white; }
        .badge-exclusivo { background: var(--red-df); color: white; }
        .badge-parcial { background: #ffc107; color: #000; }
        
        .alerta-pisca { background: #ffc107; color: #000; font-weight: bold; padding: 2px 6px; border-radius: 4px; animation: piscar 1.5s infinite; font-size: 0.7rem; }
        @keyframes piscar { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        mark { background: #ffeeb6; border-radius: 2px; }
        .item-compativel { background-color: #f0fff4 !important; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>🔭 Sniper Pharma Monitor</h3>
        <button class="btn btn-sm btn-outline-secondary" onclick="limparFiltros()">Limpar Filtros</button>
    </div>

    <div class="row g-2 mb-4">
        <div class="col-md-3"><input type="text" id="filterOrgao" class="form-control form-control-sm" placeholder="Órgão ou UASG" oninput="filtrar()"></div>
        <div class="col-md-2"><input type="text" id="filterCidade" class="form-control form-control-sm" placeholder="Cidade" oninput="filtrar()"></div>
        <div class="col-md-1"><input type="text" id="filterUF" class="form-control form-control-sm" placeholder="UF" oninput="filtrar()"></div>
        <div class="col-md-3"><input type="date" id="filterData" class="form-control form-control-sm" onchange="filtrar()"></div>
    </div>

    <div id="monitor-content"></div>
</div>

<div class="modal fade" id="modalDetalhes" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content">
    <div class="modal-header header-card"><h6 id="modalTitle"></h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="modalBody"></div>
</div></div></div>

<script>
let allData = [], filteredData = [], compatData = {};
const modalObj = new bootstrap.Modal(document.getElementById('modalDetalhes'));

async function loadData() {
    try {
        const resCompat = await fetch('relatorio_compatibilidade_consolidado.csv');
        if(resCompat.ok) {
            const text = await resCompat.text();
            Papa.parse(text, { header: true, complete: r => {
                r.data.forEach(row => {
                    if(!compatData[row.id_licitacao]) compatData[row.id_licitacao] = {};
                    compatData[row.id_licitacao][row.item_num] = row.descricao_item;
                });
            }});
        }

        const res = await fetch('pregacoes_pharma_limpos.json.gz');
        const buffer = await res.arrayBuffer();
        allData = JSON.parse(pako.ungzip(new Uint8Array(buffer), { to: 'string' }));
        allData.sort((a,b) => new Date(b.dt_enc) - new Date(a.dt_enc));
        filteredData = [...allData];
        render();
    } catch(e) { console.error(e); }
}

function render() {
    const container = document.getElementById('monitor-content');
    container.innerHTML = '';
    filteredData.forEach(lic => {
        let qtdMeEpp = 0, total = lic.itens?.length || 0;
        lic.itens?.forEach(it => { if([1,2,3].includes(it.benef)) qtdMeEpp++; });
        
        let badgeTipo = qtdMeEpp === total ? '<span class="badge-tipo badge-exclusivo">EXCLUSIVO ME/EPP</span>' : 
                        qtdMeEpp > 0 ? '<span class="badge-tipo badge-parcial">ME/EPP PARCIAL</span>' : 
                        '<span class="badge-tipo badge-amplo">AMPLA PARTICIPAÇÃO</span>';

        const div = document.createElement('div');
        div.className = 'card card-licitacao';
        div.innerHTML = `
            <div class="header-card d-flex justify-content-between">
                <div><span class="badge-uf">${lic.uf}</span> <b>${lic.org}</b> ${lic.alerta_data ? '<span class="alerta-pisca">ADIADO</span>' : ''}</div>
                <div>${badgeTipo}</div>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-9">
                        <small class="text-muted">${lic.cid} | UASG: ${lic.uasg}</small>
                        <p class="mb-1"><b>${lic.obj}</b></p>
                        <small>Edital: ${lic.edit} | Vencimento: ${new Date(lic.dt_enc).toLocaleString()}</small>
                    </div>
                    <div class="col-md-3 text-end">
                        <button class="btn btn-primary btn-sm" onclick="abrirItens('${lic.id}')">DETALHAR ${total} ITENS</button>
                    </div>
                </div>
            </div>`;
        container.appendChild(div);
    });
}

function abrirItens(id) {
    const lic = allData.find(x => x.id === id);
    document.getElementById('modalTitle').innerText = lic.org;
    let html = `<table class="table table-sm table-bordered" style="font-size:0.8rem"><thead><tr class="table-dark"><th>#</th><th>Descrição</th><th>ME/EPP</th><th>Qtd</th><th>Valor Est.</th></tr></thead><tbody>`;
    
    lic.itens.forEach(it => {
        const formatado = compatData[lic.id]?.[it.n];
        const meEpp = [1,2,3].includes(it.benef) ? '<span class="benef-sim">SIM</span>' : '<span class="benef-nao">NÃO</span>';
        html += `<tr class="${formatado ? 'item-compativel' : ''}">
            <td>${it.n}</td>
            <td>${formatado || it.d}</td>
            <td class="text-center">${meEpp}</td>
            <td>${it.q} ${it.u}</td>
            <td>R$ ${it.v_est.toLocaleString()}</td>
        </tr>`;
    });
    document.getElementById('modalBody').innerHTML = html + '</tbody></table>';
    modalObj.show();
}

function filtrar() {
    const org = document.getElementById('filterOrgao').value.toUpperCase();
    const cid = document.getElementById('filterCidade').value.toUpperCase();
    const uf = document.getElementById('filterUF').value.toUpperCase();
    const dt = document.getElementById('filterData').value;
    filteredData = allData.filter(l => 
        (!org || l.org.includes(org) || l.uasg.includes(org)) &&
        (!cid || l.cid.includes(cid)) &&
        (!uf || l.uf.includes(uf)) &&
        (!dt || l.dt_enc.includes(dt))
    );
    render();
}

function limparFiltros() { document.querySelectorAll('input').forEach(i => i.value = ''); filteredData = [...allData]; render(); }

loadData();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Pharma - Painel de Licitações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --blue-df: #004a99; --green-df: #198754; --red-df: #dc3545; --yellow-df: #ffc107; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; color: #333; font-size: 0.92rem; }
        
        .header-card { 
            background: linear-gradient(90deg, #002d5a 0%, #004a99 100%); 
            color: white; padding: 12px 20px; border-radius: 10px 10px 0 0; font-size: 1.05rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-bold { font-weight: 700; }
        .badge-uf-header { background-color: #000; color: #fff; font-weight: 800; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }

        .compat-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 8px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        .compat-alta { background: #28a745; color: white; }
        .compat-media { background: #ffc107; color: #212529; }
        .compat-baixa { background: #dc3545; color: white; }
        .compat-na { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }

        .item-compativel {
            background-color: #d4edda !important;
            border-left: 4px solid #28a745 !important;
        }
        .item-compativel td {
            color: #155724 !important;
            font-weight: 600 !important;
        }
        .item-compativel .compat-indicador {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            font-size: 0.7rem;
            margin-right: 6px;
        }

        .benef-sim { color: var(--red-df) !important; font-weight: bold !important; }
        .benef-nao { color: var(--green-df) !important; font-weight: bold !important; }

        .badge-tipo { font-weight: 800; padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; letter-spacing: 0.5px; display: inline-flex; align-items: center; }
        .badge-amplo { background-color: var(--green-df); color: white; }
        .badge-exclusivo { background-color: var(--red-df); color: white; }
        .badge-parcial { background-color: var(--yellow-df); color: #212529; }

        .card-licitacao { border-radius: 10px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; overflow: hidden; }
        .filter-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid #e0e6ed; margin-bottom: 20px; }
        .filter-label { font-size: 0.65rem; font-weight: 800; color: var(--blue-df); margin-bottom: 2px; display: block; text-transform: uppercase; }
        
        .table-itens { font-size: 0.82em; }
        .val-estimado { background-color: #fffdf2; }
        .val-homologado { background-color: #f2f7ff; }
        .header-fornecedor { background-color: #f8f9fa; color: var(--blue-df); font-weight: bold; }
        .header-status-andamento { background-color: #fff9db; font-weight: bold; color: #856404; text-align: center; }
        .header-status-deserto { background-color: #f8d7da; font-weight: bold; color: #721c24; text-align: center; }
        .header-status-cancelado { background-color: #e2e3e5; font-weight: bold; color: #383d41; text-align: center; }
        
        .pagination-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; padding-bottom: 40px; flex-wrap: wrap; }
        .page-input { width: 60px; text-align: center; padding: 4px 8px; border: 1px solid #004a99; border-radius: 4px; font-size: 0.875rem; font-weight: 600; }
        .btn-go { background: #004a99; color: white; border: none; padding: 4px 12px; border-radius: 4px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
        .btn-go:hover { background: #003366; }
        .page-info-text { font-size: 0.875rem; color: #666; }
        
        .btn-excluir { font-size: 0.7rem; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .btn-excluir:hover { background: var(--red-df); border-color: var(--red-df); }

        .compat-barra-container {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 10px;
        }
        .compat-barra {
            width: 60px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        .compat-barra-preenchido {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="fw-bold mb-0" style="color: #003366;">🔭 Sniper Pharma Monitor</h3>
            <span class="badge bg-dark" style="font-size: 0.7rem;">ANALISTA DE LICITAÇÕES | PNCP & COMPRASGOV</span>
        </div>
        <button class="btn btn-success fw-bold" onclick="abrirInclusaoManual()">+ Inclusão Manual (PNCP)</button>
    </div>
    
    <div class="filter-box shadow-sm">
        <div class="row g-2">
            <div class="col-md-2">
                <label class="filter-label">DATA ENCERRAMENTO</label>
                <input type="date" id="filterData" class="form-control form-control-sm" onchange="filtrar()">
            </div>
            <div class="col-md-1">
                <label class="filter-label">UF</label>
                <input type="text" id="filterUF" class="form-control form-control-sm" placeholder="Ex: PE" oninput="filtrar()">
            </div>
            <div class="col-md-2">
                <label class="filter-label">CIDADE</label>
                <input type="text" id="filterCidade" class="form-control form-control-sm" placeholder="Busque a cidade..." oninput="filtrar()">
            </div>
            <div class="col-md-3">
                <label class="filter-label">ÓRGÃO / CÓDIGO</label>
                <input type="text" id="filterOrgao" class="form-control form-control-sm" placeholder="Nome ou UASG" oninput="filtrar()">
            </div>
            <div class="col-md-2">
                <label class="filter-label">Nº EDITAL</label>
                <input type="text" id="filterEdital" class="form-control form-control-sm" placeholder="00000/2026" oninput="filtrar()">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-sm btn-outline-secondary w-100 fw-bold" onclick="limparFiltros()">LIMPAR FILTROS</button>
            </div>
        </div>
    </div>

    <div id="monitor-content">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-2 text-muted">Carregando licitações...</p>
        </div>
    </div>

    <div class="pagination-container">
        <button class="btn btn-sm btn-outline-primary px-3" id="prevPage">Anterior</button>
        <span class="page-info-text">Página</span>
        <input type="number" id="pageInput" class="page-input" min="1" value="1" onkeypress="if(event.key==='Enter')irParaPagina()">
        <span class="page-info-text">de <span id="totalPages">1</span></span>
        <button class="btn-go" onclick="irParaPagina()">Ir</button>
        <button class="btn btn-sm btn-outline-primary px-3" id="nextPage">Próxima</button>
    </div>
</div>

<div class="modal fade" id="modalDetalhes" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
            <div class="modal-header header-card py-2">
                <h6 class="modal-title fw-bold" id="modalTitle">Itens da Licitação</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-3" id="modalBody"></div>
            <div class="modal-footer bg-light border-0 py-2">
                <a id="linkPncp" href="#" target="_blank" class="btn btn-sm btn-primary px-4 fw-bold">VER NO PNCP</a>
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">FECHAR</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalInclusao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white py-2">
                <h6 class="modal-title fw-bold">➕ Incluir Novo Link no Repositório</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="filter-label">URL DA LICITAÇÃO NO PNCP</label>
                    <input type="text" id="inputLinkPncp" class="form-control shadow-sm" placeholder="https://pncp.gov.br/app/editais/...">
                </div>
                <div class="mb-3">
                    <label class="filter-label">GITHUB PERSONAL ACCESS TOKEN (PAT)</label>
                    <input type="password" id="inputGithubToken" class="form-control shadow-sm" placeholder="ghp_xxxxxxxxxxxx">
                    <div class="mt-1" style="font-size: 0.65rem; color: #666;">
                        Necessário permissão 'repo' para salvar no arquivo <b>links_manuais.txt</b>.
                    </div>
                </div>
                <div id="statusInclusao" class="mt-3 text-center fw-bold" style="font-size: 0.8rem;"></div>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-sm btn-success fw-bold px-4" onclick="processarInclusaoManual()">SALVAR NO GITHUB</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allData = [];
let filteredData = [];
let compatData = {};  
let currentPage = 1;
let totalPages = 1;
const itemsPerPage = 20;

const GITHUB_OWNER = 'jenissonb88-bot';
const GITHUB_REPO = 'licitacoes_df';
const GITHUB_FILE_PATH = 'links_manuais.txt';

const modalObj = new bootstrap.Modal(document.getElementById('modalDetalhes'));
const modalInclusaoObj = new bootstrap.Modal(document.getElementById('modalInclusao'));

async function loadCompatData() {
    try {
        let response = await fetch('relatorio_compatibilidade_consolidado.csv');
        if (!response.ok) {
            console.log('Arquivo consolidado não encontrado, tentando formato antigo...');
            response = await fetch('relatorio_compatibilidade.csv');
            if(!response.ok) return;
        }
        await parseCompatCSV(await response.text());
    } catch (e) {
        console.log('Erro ao carregar compatibilidade:', e);
    }
}

async function parseCompatCSV(csvText) {
    const lines = csvText.trim().split('\n');
    if (lines.length < 2) return;
    
    const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, '').replace(/^"|"$/g, ''));
    
    const colIdLicitacao = headers.indexOf('id_licitacao');
    const colTermoEncontrado = headers.indexOf('termo_encontrado');
    const colDescricaoItem = headers.indexOf('descricao_item');
    
    const colOldId = headers.indexOf('licitacao_id') !== -1 ? headers.indexOf('licitacao_id') : headers.indexOf('id');
    const colOldMatches = headers.indexOf('componentes_match') !== -1 ? headers.indexOf('componentes_match') : headers.indexOf('principais_matches');
    
    const isNovoFormatoPython = colIdLicitacao >= 0 && colTermoEncontrado >= 0;
    
    for (let i = 1; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        if (cols.length < 2) continue;
        
        let id, matches = [];
        
        if (isNovoFormatoPython) {
            id = cols[colIdLicitacao];
            matches = (cols[colTermoEncontrado] || '').split('|').map(m => m.trim()).filter(m => m);
        } else {
            id = cols[colOldId];
            matches = (colOldMatches >= 0 && cols[colOldMatches] ? cols[colOldMatches] : '').split('|').map(m => m.trim()).filter(m => m);
        }
        
        if (!id) continue;
        
        if (!compatData[id]) {
            compatData[id] = { 
                percentual: 100,
                confianca: 'ALTO', 
                matches: [],
                itensPortfolio: []
            };
        }
        
        compatData[id].matches.push(...matches);
    }
    
    for (const id in compatData) {
        compatData[id].matches = [...new Set(compatData[id].matches)];
    }
}

function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];
        
        if (char === '"') {
            if (inQuotes && nextChar === '"') {
                current += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current.trim());
    return result;
}

function calcularCompatibilidadeLic(lic) {
    const compat = compatData[lic.id];
    if (!compat || !compat.matches.length) return { percentual: 0, confianca: 'N/A', itensCompat: 0, totalItens: 0 };
    
    const totalItens = lic.itens?.length || 0;
    if (totalItens === 0) return { percentual: 0, confianca: 'N/A', itensCompat: 0, totalItens: 0 };
    
    let itensCompat = 0;
    const matchesNorm = compat.matches.map(m => m.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''));
    
    for (const item of lic.itens || []) {
        const descNorm = (item.d || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        const isCompat = matchesNorm.some(match => descNorm.includes(match));
        if (isCompat) {
            itensCompat++;
        }
    }
    
    const percentual = Math.round((itensCompat / totalItens) * 100);
    
    let confianca = 'BAIXO';
    if (percentual >= 70) confianca = 'ALTO';
    else if (percentual >= 40) confianca = 'MEDIO';
    
    return { percentual, confianca, itensCompat, totalItens };
}

function getCompatBadgeHTML(lic) {
    const compat = calcularCompatibilidadeLic(lic);
    
    if (compat.totalItens === 0 || compat.percentual === 0) {
        return '<span class="compat-badge compat-na">⚪ N/A</span>';
    }
    
    const pct = compat.percentual;
    let classe = 'compat-baixa';
    let corBarra = '#dc3545';
    
    if (pct >= 70) { classe = 'compat-alta'; corBarra = '#28a745'; }
    else if (pct >= 40) { classe = 'compat-media'; corBarra = '#ffc107'; }
    
    return `
        <span class="compat-badge ${classe}">
            ${pct}% (${compat.itensCompat}/${compat.totalItens})
        </span>
        <span class="compat-barra-container">
            <span class="compat-barra">
                <span class="compat-barra-preenchido" style="width: ${pct}%; background: ${corBarra};"></span>
            </span>
        </span>
    `;
}

async function loadData() {
    try {
        await loadCompatData();
        
        const response = await fetch('pregacoes_pharma_limpos.json.gz');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        if (typeof DecompressionStream === 'undefined') {
            const fallbackResponse = await fetch('pregacoes_pharma_limpos.json');
            if (fallbackResponse.ok) {
                const text = await fallbackResponse.text();
                allData = JSON.parse(text);
            } else {
                throw new Error('Browser não suporta descompressão e arquivo fallback não encontrado');
            }
        } else {
            const ds = new DecompressionStream('gzip');
            const decompressedStream = response.body.pipeThrough(ds);
            const text = await new Response(decompressedStream).text();
            allData = JSON.parse(text);
        }
        
        if (!Array.isArray(allData)) {
            const temp = [];
            for (const orgao in allData) {
                for (const edital in allData[orgao]) {
                    const item = allData[orgao][edital];
                    item.orgao = orgao;
                    item.edital = edital;
                    temp.push(item);
                }
            }
            allData = temp;
        }
        
        allData.sort((a, b) => new Date(b.dt_enc || 0) - new Date(a.dt_enc || 0));
        
        filteredData = [...allData];
        renderMonitor();
        
    } catch (e) {
        console.error('Erro:', e);
        document.getElementById('monitor-content').innerHTML = `
            <div class="alert alert-danger m-4">
                <h4>❌ Erro ao carregar dados</h4>
                <p>${e.message}</p>
                <button class="btn btn-primary mt-2" onclick="location.reload()">🔄 Tentar Novamente</button>
            </div>
        `;
    }
}

function renderMonitor() {
    const container = document.getElementById('monitor-content');
    container.innerHTML = '';
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filteredData.slice(start, end);

    if (pageItems.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">Nenhuma licitação encontrada.</div>';
        return;
    }

    pageItems.forEach(lic => {
        const div = document.createElement('div');
        div.className = 'card card-licitacao';
        
        // ==========================================
        // ✅ CORREÇÃO AQUI: PROVA REAL MATEMÁTICA
        // ==========================================
        
        // 1. Soma os valores unitários reais de cada item (Quantidade * Valor Estimado Unitário)
        let somaRealItens = 0;
        if (lic.itens && lic.itens.length > 0) {
            lic.itens.forEach(it => {
                const vEst = parseFloat(it.v_est) || 0;
                const qtd = parseFloat(it.q) || 0;
                somaRealItens += (vEst * qtd);
            });
        }
        
        // 2. Compara a soma matemática com o cabeçalho ("capa") do PNCP
        const valCapa = parseFloat(lic.val_tot) || 0;
        
        // Se a soma dos itens for maior que zero, confiamos na matemática (pois a capa do PNCP frequentemente falha). 
        // Caso contrário, usamos o valor da capa como backup.
        const valorFinalCalculado = somaRealItens > 0 ? somaRealItens : valCapa;

        // 3. Formata para o painel
        const valorTotal = valorFinalCalculado > 0 
            ? `R$ ${valorFinalCalculado.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` 
            : 'Sigiloso/Não inf.';

        let tipoLic = "AMPLO", cssTipo = "badge-amplo";
        if (lic.itens?.length > 0) {
            const todosExclusivos = lic.itens.every(it => [1, 2, 3].includes(parseInt(it.benef)));
            const algumExclusivo = lic.itens.some(it => [1, 2, 3].includes(parseInt(it.benef)));
            if (todosExclusivos) { tipoLic = "EXCLUSIVO"; cssTipo = "badge-exclusivo"; } 
            else if (algumExclusivo) { tipoLic = "PARCIAL"; cssTipo = "badge-parcial"; }
        }

        let alertaGlobalHtml = '';
        if (["REVOGADA", "ANULADA", "SUSPENSA"].includes(lic.sit_global)) {
            alertaGlobalHtml = `<div style="color: #dc3545; font-weight: 900; font-size: 0.85rem; margin-top: 5px; text-transform: uppercase; border: 1px solid #dc3545; border-radius: 4px; padding: 2px;">⚠️ PROCESSO ${lic.sit_global}</div>`;
        }

        const compatBadge = getCompatBadgeHTML(lic);

        div.innerHTML = ` 
            <div class="header-card">
                <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
                    <span class="badge-uf-header">${lic.uf || '??'}</span>
                    <span class="header-bold">${lic.org || '---'}</span>
                    <span class="ms-2 opacity-75 small">| Edital: ${lic.edit || lic.id || '---'}</span>
                    ${compatBadge}
                </div>
                <button class="btn-excluir" onclick="excluirLicitacao('${lic.id}')">Excluir</button>
            </div>
            <div class="card-body py-3">
                <div class="row align-items-center">
                    <div class="col-md-8 border-end">
                        <small class="text-muted d-block mb-1">${lic.cid || '---'} - ${lic.unid_nome || '---'}</small>
                        <h6 class="fw-bold mb-2">${lic.obj || 'Sem descrição'}</h6>
                        <div class="d-flex gap-2 mt-2">
                            <span class="badge bg-secondary">UASG: ${lic.uasg || 'N/A'}</span>
                            <span class="badge bg-info text-dark">Venc: ${lic.dt_enc ? new Date(lic.dt_enc).toLocaleString('pt-BR') : 'N/A'}</span>
                            <span class="badge-tipo ${cssTipo}">${tipoLic}</span>
                        </div>
                    </div>
                    <div class="col-md-4 text-center">
                        <small class="text-muted">VALOR ESTIMADO TOTAL</small>
                        <h5 class="fw-bold text-primary mb-0">${valorTotal}</h5>
                        ${alertaGlobalHtml}
                        <div class="mt-3">
                            <span class="badge bg-dark me-2">${lic.fonte || 'PNCP'}</span>
                            <button class="btn btn-sm btn-primary px-4 fw-bold" onclick="abrirItens('${lic.id}')">DETALHAR ${lic.itens?.length || 0} ITENS</button>
                        </div>
                    </div>
                </div>
             </div>`;
        container.appendChild(div);
    });

    totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
    document.getElementById('totalPages').textContent = totalPages;
    document.getElementById('pageInput').value = currentPage;
    document.getElementById('pageInput').max = totalPages;
    
    document.getElementById('prevPage').disabled = currentPage <= 1;
    document.getElementById('nextPage').disabled = currentPage >= totalPages;
}

function irParaPagina() {
    const input = document.getElementById('pageInput');
    let pagina = parseInt(input.value) || 1;
    if (pagina < 1) pagina = 1;
    if (pagina > totalPages) pagina = totalPages;
    
    currentPage = pagina;
    renderMonitor();
    window.scrollTo(0, 0);
}

function filtrar() {
    const dataEnc = document.getElementById('filterData').value;
    const uf = document.getElementById('filterUF').value.toUpperCase();
    const cid = document.getElementById('filterCidade').value.toUpperCase();
    const org = document.getElementById('filterOrgao').value.toUpperCase();
    const edt = document.getElementById('filterEdital').value.toUpperCase();

    filteredData = allData.filter(lic => {
        const dataLic = lic.dt_enc ? lic.dt_enc.split('T')[0] : '';
        return (!dataEnc || dataLic === dataEnc) &&
               (!uf || (lic.uf || '').toUpperCase().includes(uf)) &&
               (!cid || (lic.cid || '').toUpperCase().includes(cid)) &&
               (!org || (lic.org || '').toUpperCase().includes(org) || (lic.uasg || '').includes(org)) &&
               (!edt || (lic.edit || lic.id || '').toUpperCase().includes(edt));
    });
    
    currentPage = 1;
    renderMonitor();
}

function limparFiltros() {
    document.querySelectorAll('input').forEach(i => i.value = '');
    filteredData = [...allData];
    currentPage = 1;
    renderMonitor();
}

function getItemCompatInfo(item, licId) {
    const compat = compatData[licId];
    if (!compat || !compat.matches.length) return { isCompat: false, matchInfo: null };
    
    const descNorm = (item.d || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const matchesNorm = compat.matches.map(m => m.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''));
    
    for (let i = 0; i < matchesNorm.length; i++) {
        if (descNorm.includes(matchesNorm[i])) {
            return { 
                isCompat: true, 
                matchInfo: compat.matches[i].toUpperCase(),
            };
        }
    }
    
    return { isCompat: false, matchInfo: null };
}

function abrirItens(id) {
    const lic = allData.find(x => x.id === id);
    if (!lic) return;
    
    const compatStats = calcularCompatibilidadeLic(lic);
    
    document.getElementById('modalTitle').innerHTML = `
        Itens: ${lic.org || '---'} (Edital ${lic.edit || '---'})
        ${compatStats.percentual > 0 ? `<span class="badge ${compatStats.confianca === 'ALTO' ? 'bg-success' : compatStats.confianca === 'MEDIO' ? 'bg-warning text-dark' : 'bg-danger'} ms-2">${compatStats.percentual}% compatível (${compatStats.itensCompat}/${compatStats.totalItens})</span>` : ''}
    `;
    document.getElementById('linkPncp').href = lic.link || '#';

    const grupos = {}, andamento = [], desertos = [], cancelados = [];

    (lic.itens || []).forEach(it => {
        if (it.sit === "HOMOLOGADO" && it.res_forn) {
            if (!grupos[it.res_forn]) grupos[it.res_forn] = [];
            grupos[it.res_forn].push(it);
        } else if (it.sit === "CANCELADO") cancelados.push(it);
        else if (it.sit === "DESERTO" || it.sit === "FRACASSADO") desertos.push(it);
        else andamento.push(it);
    });

    let html = `<div class="table-responsive"><table class="table table-sm table-bordered table-itens"><thead class="table-dark"> 
        <tr><th>#</th><th>Descrição</th><th>Compat.</th><th>ME/EPP</th><th>Qtd/Un</th><th>Est. Unit.</th><th>Final Unit.</th><th>Total</th></tr></thead><tbody>`;

    const renderSection = (titulo, itens, classeHeader) => {
        if (itens.length === 0) return '';
        let sectionHtml = `<tr><td colspan="8" class="${classeHeader}">${titulo} (${itens.length})</td></tr>`;
        itens.forEach(it => sectionHtml += renderLinhaItem(it, lic.id));
        return sectionHtml;
    };

    html += renderSection("ITENS EM ANDAMENTO", andamento, "header-status-andamento");
    html += renderSection("ITENS DESERTOS", desertos, "header-status-deserto");
    html += renderSection("ITENS CANCELADOS", cancelados, "header-status-cancelado");
    
    Object.keys(grupos).forEach(forn => {
        html += `<tr class="header-fornecedor"><td colspan="8">Fornecedor: ${forn} (${grupos[forn].length} itens)</td></tr>`;
        grupos[forn].forEach(it => html += renderLinhaItem(it, lic.id));
    });

    html += '</tbody></table></div>';
    document.getElementById('modalBody').innerHTML = html;
    modalObj.show();
}

function renderLinhaItem(it, licId) {
    const isMeEpp = [1, 2, 3].includes(parseInt(it.benef));
    const meEppHtml = isMeEpp ? '<span class="benef-sim">SIM</span>' : '<span class="benef-nao">NÃO</span>';
    
    const valFinal = parseFloat(it.res_val) || 0;
    const valEstimado = parseFloat(it.v_est) || 0;
    const qtd = parseFloat(it.q) || 0;
    const valorTotal = valFinal > 0 ? (valFinal * qtd) : (valEstimado * qtd);

    const compatInfo = getItemCompatInfo(it, licId);
    const isCompat = compatInfo.isCompat;
    
    let compatCell = '<span class="text-muted">-</span>';
    let compatClass = '';
    let descricaoHtml = it.d || 'Sem descrição';
    
    if (isCompat) {
        compatClass = 'item-compativel';
        compatCell = `<span class="badge bg-success" title="Palavra-chave: ${compatInfo.matchInfo || ''}">✓ SIM</span>`;
        descricaoHtml = `<span class="compat-indicador">✓</span>${it.d || 'Sem descrição'} <br><small class="text-success fw-bold">(${compatInfo.matchInfo})</small>`;
    }

    return `<tr class="${compatClass}">
            <td class="text-center fw-bold">${it.n || '?'}</td>
            <td>${descricaoHtml}</td>
            <td class="text-center">${compatCell}</td>
            <td class="text-center">${meEppHtml}</td>
            <td class="text-center">${qtd.toLocaleString('pt-BR')} ${it.u || ''}</td>
            <td class="text-center val-estimado">R$ ${valEstimado.toLocaleString('pt-BR', {minimumFractionDigits: 4, maximumFractionDigits: 4})}</td>
            <td class="text-center val-homologado">${valFinal > 0 ? 'R$ ' + valFinal.toLocaleString('pt-BR', {minimumFractionDigits: 4, maximumFractionDigits: 4}) : '---'}</td>
            <td class="text-center fw-bold">R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
             </tr>`;
}

function excluirLicitacao(id) {
    if(confirm("Deseja remover esta licitação?")) {
        allData = allData.filter(x => x.id !== id);
        filtrar();
    }
}

function abrirInclusaoManual() { 
    document.getElementById('inputLinkPncp').value = '';
    document.getElementById('inputGithubToken').value = '';
    document.getElementById('statusInclusao').innerHTML = '';
    modalInclusaoObj.show(); 
}

async function processarInclusaoManual() {
    const link = document.getElementById('inputLinkPncp').value.trim();
    const token = document.getElementById('inputGithubToken').value.trim();
    const statusDiv = document.getElementById('statusInclusao');

    if (!link || !token) {
        statusDiv.innerHTML = '<span class="text-danger">Preencha link e token.</span>';
        return;
    }

    statusDiv.innerHTML = '<span class="text-primary">Conectando...</span>';

    try {
        const urlFile = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`;
        const resGet = await fetch(urlFile, { headers: { 'Authorization': `token ${token}` } });

        let sha = "", currentContent = "";
        if (resGet.ok) {
            const data = await resGet.json();
            sha = data.sha;
            currentContent = decodeURIComponent(escape(atob(data.content)));
        }

        const newContent = currentContent + (currentContent.endsWith('\n') ? "" : "\n") + link + "\n";
        
        const resPut = await fetch(urlFile, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Inclusão manual via Sniper Pharma",
                content: btoa(unescape(encodeURIComponent(newContent))),
                sha: sha
            })
        });

        statusDiv.innerHTML = resPut.ok 
            ? '<span class="text-success">✅ Salvo com sucesso!</span>' 
            : '<span class="text-danger">Erro ao salvar</span>';
            
        if (resPut.ok) setTimeout(() => modalInclusaoObj.hide(), 2000);
    } catch (e) {
        statusDiv.innerHTML = `<span class="text-danger">Erro: ${e.message}</span>`;
    }
}

document.getElementById('prevPage').onclick = () => { if(currentPage > 1) { currentPage--; renderMonitor(); window.scrollTo(0,0); } };
document.getElementById('nextPage').onclick = () => { if(currentPage < totalPages) { currentPage++; renderMonitor(); window.scrollTo(0,0); } };

loadData();

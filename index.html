<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Pharma - Painel de Licitações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --blue-df: #004a99; --green-df: #198754; --red-df: #dc3545; --yellow-df: #ffc107; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; color: #333; font-size: 0.92rem; }
        
        .header-card { 
            background: linear-gradient(90deg, #002d5a 0%, #004a99 100%); 
            color: white; padding: 12px 20px; border-radius: 10px 10px 0 0; font-size: 1.05rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-bold { font-weight: 700; }
        .badge-uf-header { background-color: #000; color: #fff; font-weight: 800; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }

        /* Badge de compatibilidade - ATUALIZADO PARA NOVOS THRESHOLDS */
        .compat-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-right: 8px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        /* 🟢 Verde: ≥60% */
        .compat-alta { 
            background: #28a745; 
            color: white; 
            box-shadow: 0 2px 4px rgba(40, 167, 69, 0.4);
        }
        /* 🟡 Amarelo: 20-59% */
        .compat-media { 
            background: #ffc107; 
            color: #212529; 
            box-shadow: 0 2px 4px rgba(255, 193, 7, 0.4);
        }
        /* 🔴 Vermelho: 5-19% */
        .compat-baixa { 
            background: #dc3545; 
            color: white; 
            box-shadow: 0 2px 4px rgba(220, 53, 69, 0.4);
        }
        /* ⚪ Transparente: <5% */
        .compat-na { 
            background: rgba(255,255,255,0.15); 
            color: rgba(255,255,255,0.6); 
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Destaque para itens compatíveis */
        .item-compativel {
            background-color: #d4edda !important;
            font-weight: 700 !important;
            border-left: 3px solid #28a745 !important;
        }
        .item-compativel td { 
            color: #155724 !important; 
            font-weight: 700 !important; 
        }

        .benef-sim { color: var(--red-df) !important; font-weight: bold !important; }
        .benef-nao { color: var(--green-df) !important; font-weight: bold !important; }

        .badge-tipo { font-weight: 800; padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; letter-spacing: 0.5px; display: inline-flex; align-items: center; }
        .badge-amplo { background-color: var(--green-df); color: white; }
        .badge-exclusivo { background-color: var(--red-df); color: white; }
        .badge-parcial { background-color: var(--yellow-df); color: #212529; }

        .card-licitacao { border-radius: 10px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; overflow: hidden; }
        .filter-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid #e0e6ed; margin-bottom: 20px; }
        .filter-label { font-size: 0.65rem; font-weight: 800; color: var(--blue-df); margin-bottom: 2px; display: block; text-transform: uppercase; }
        
        .table-itens { font-size: 0.82em; }
        .val-estimado { background-color: #fffdf2; }
        .val-homologado { background-color: #f2f7ff; }
        
        .header-fornecedor { background-color: #f8f9fa; color: var(--blue-df); font-weight: bold; }
        
        .header-status-andamento { background-color: #fff9db; font-weight: bold; color: #856404; text-align: center; }
        .header-status-deserto { background-color: #f8d7da; font-weight: bold; color: #721c24; text-align: center; }
        .header-status-cancelado { background-color: #e2e3e5; font-weight: bold; color: #383d41; text-align: center; }
        
        .pagination-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; padding-bottom: 40px; }
        
        .btn-excluir { font-size: 0.7rem; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .btn-excluir:hover { background: var(--red-df); border-color: var(--red-df); }
    </style>
</head>
<body>

<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="fw-bold mb-0" style="color: #003366;">🔭 Sniper Pharma Monitor</h3>
            <span class="badge bg-dark" style="font-size: 0.7rem;">ANALISTA DE LICITAÇÕES | PNCP & COMPRASGOV</span>
        </div>
        <button class="btn btn-success fw-bold" onclick="abrirInclusaoManual()">+ Inclusão Manual (PNCP)</button>
    </div>
    
    <div class="filter-box shadow-sm">
        <div class="row g-2">
            <div class="col-md-2">
                <label class="filter-label">DATA ENCERRAMENTO</label>
                <input type="date" id="filterData" class="form-control form-control-sm" onchange="filtrar()">
            </div>
            <div class="col-md-1">
                <label class="filter-label">UF</label>
                <input type="text" id="filterUF" class="form-control form-control-sm" placeholder="Ex: PE" oninput="filtrar()">
            </div>
            <div class="col-md-2">
                <label class="filter-label">CIDADE</label>
                <input type="text" id="filterCidade" class="form-control form-control-sm" placeholder="Busque a cidade..." oninput="filtrar()">
            </div>
            <div class="col-md-3">
                <label class="filter-label">ÓRGÃO / CÓDIGO</label>
                <input type="text" id="filterOrgao" class="form-control form-control-sm" placeholder="Nome ou UASG" oninput="filtrar()">
            </div>
            <div class="col-md-2">
                <label class="filter-label">Nº EDITAL</label>
                <input type="text" id="filterEdital" class="form-control form-control-sm" placeholder="00000/2026" oninput="filtrar()">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-sm btn-outline-secondary w-100 fw-bold" onclick="limparFiltros()">LIMPAR FILTROS</button>
            </div>
        </div>
    </div>

    <div id="monitor-content"></div>

    <div class="pagination-container">
        <button class="btn btn-sm btn-outline-primary px-3" id="prevPage">Anterior</button>
        <span id="pageInfo" class="fw-bold px-2 small">Página 1</span>
        <button class="btn btn-sm btn-outline-primary px-3" id="nextPage">Próxima</button>
    </div>
</div>

<div class="modal fade" id="modalDetalhes" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
            <div class="modal-header header-card py-2">
                <h6 class="modal-title fw-bold" id="modalTitle">Itens da Licitação</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-3" id="modalBody"></div>
            <div class="modal-footer bg-light border-0 py-2">
                <a id="linkPncp" href="#" target="_blank" class="btn btn-sm btn-primary px-4 fw-bold">VER NO PNCP</a>
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">FECHAR</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalInclusao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white py-2">
                <h6 class="modal-title fw-bold">➕ Incluir Novo Link no Repositório</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="filter-label">URL DA LICITAÇÃO NO PNCP</label>
                    <input type="text" id="inputLinkPncp" class="form-control shadow-sm" placeholder="https://pncp.gov.br/app/editais/...">
                </div>
                <div class="mb-3">
                    <label class="filter-label">GITHUB PERSONAL ACCESS TOKEN (PAT)</label>
                    <input type="password" id="inputGithubToken" class="form-control shadow-sm" placeholder="ghp_xxxxxxxxxxxx">
                    <div class="mt-1" style="font-size: 0.65rem; color: #666;">
                        Necessário permissão 'repo' para salvar no arquivo <b>links_manuais.txt</b>.
                    </div>
                </div>
                <div id="statusInclusao" class="mt-3 text-center fw-bold" style="font-size: 0.8rem;"></div>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-sm btn-success fw-bold px-4" onclick="processarInclusaoManual()">SALVAR NO GITHUB</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allData = [];
let filteredData = [];
let compatData = {};
let currentPage = 1;
const itemsPerPage = 20;

const GITHUB_OWNER = 'jenissonb88-bot';
const GITHUB_REPO = 'licitacoes_df';
const GITHUB_FILE_PATH = 'links_manuais.txt';

const modalObj = new bootstrap.Modal(document.getElementById('modalDetalhes'));
const modalInclusaoObj = new bootstrap.Modal(document.getElementById('modalInclusao'));

// ATUALIZADO: Carrega dados de compatibilidade do novo formato (percentual em vez de score)
async function loadCompatData() {
    try {
        const response = await fetch('relatorio_compatibilidade.csv');
        if (!response.ok) return;
        
        const csvText = await response.text();
        const lines = csvText.trim().split('\n');
        if (lines.length < 2) return;
        
        const headers = lines[0].split(';').map(h => h.trim().replace(/^\uFEFF/, ''));
        
        // Mapeia índices das colunas (novo formato usa 'percentual' em vez de 'score_final')
        const colId = headers.findIndex(h => h.toLowerCase().includes('id'));
        const colPercentual = headers.findIndex(h => h.toLowerCase().includes('percentual'));
        const colConfianca = headers.findIndex(h => h.toLowerCase().includes('confianca'));
        const colMatches = headers.findIndex(h => h.toLowerCase().includes('matches'));
        
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(';');
            if (cols.length >= 4) {
                // Usa índices encontrados ou defaults
                const id = colId >= 0 ? cols[colId] : cols[0];
                const percentual = parseFloat(colPercentual >= 0 ? cols[colPercentual] : cols[3]) || 0;
                const confianca = (colConfianca >= 0 ? cols[colConfianca] : cols[4]) || 'INCOMPATIVEL';
                const matches = (colMatches >= 0 ? cols[colMatches] : '').split('|').filter(m => m);
                
                if (id) {
                    compatData[id] = { percentual, confianca: confianca.toUpperCase(), matches };
                }
            }
        }
        
        console.log(`✅ Compatibilidade carregada: ${Object.keys(compatData).length} registros`);
    } catch (e) {
        console.log('Compatibilidade não carregada:', e);
    }
}

// ATUALIZADO: Retorna HTML do badge com NOVOS THRESHOLDS
// 🟢 Verde: ≥60% | 🟡 Amarelo: 20-59% | 🔴 Vermelho: 5-19% | ⚪ Transparente: <5%
function getCompatBadgeHTML(licId) {
    const compat = compatData[licId];
    if (!compat || compat.percentual < 5) {
        return '<span class="compat-badge compat-na">⚪ N/A</span>';
    }
    
    const pct = compat.percentual.toFixed(1);
    
    // 🟢 Verde: ≥60%
    if (compat.percentual >= 60) {
        return `<span class="compat-badge compat-alta" title="${compat.matches.slice(0,3).join(', ')}">🟢 ${pct}%</span>`;
    }
    // 🟡 Amarelo: 20-59%
    else if (compat.percentual >= 20) {
        return `<span class="compat-badge compat-media" title="${compat.matches.slice(0,3).join(', ')}">🟡 ${pct}%</span>`;
    }
    // 🔴 Vermelho: 5-19%
    else {
        return `<span class="compat-badge compat-baixa" title="${compat.matches.slice(0,3).join(', ')}">🔴 ${pct}%</span>`;
    }
}

async function loadData() {
    try {
        await loadCompatData();
        
        const response = await fetch('pregacoes_pharma_limpos.json.gz');
        if(!response.ok) throw new Error();
        const ds = new DecompressionStream('gzip');
        const decompressedStream = response.body.pipeThrough(ds);
        const text = await new Response(decompressedStream).text();
        
        allData = JSON.parse(text);
        
        // MANTÉM ORDENAÇÃO ORIGINAL POR DATA (futuro -> passado) - NÃO REORDENA POR PERCENTUAL
        allData.sort((a, b) => new Date(b.dt_enc) - new Date(a.dt_enc));
        
        filteredData = [...allData];
        renderMonitor();
    } catch (e) { 
        document.getElementById('monitor-content').innerHTML = '<div class="alert alert-info">Aguardando novos dados processados pelo GitHub Actions...</div>';
    }
}

function renderMonitor() {
    const container = document.getElementById('monitor-content');
    container.innerHTML = '';
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filteredData.slice(start, end);

    if (pageItems.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">Nenhuma licitação encontrada para os filtros aplicados.</div>';
    }

    pageItems.forEach(lic => {
        const div = document.createElement('div');
        div.className = 'card card-licitacao';
        
        const valorTotal = lic.val_tot > 0 
            ? `R$ ${lic.val_tot.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` 
            : 'Sigiloso/Não inf.';

        let tipoLic = "AMPLO";
        let cssTipo = "badge-amplo";
        
        if (lic.itens && lic.itens.length > 0) {
            const todosExclusivos = lic.itens.every(it => [1, 2, 3].includes(parseInt(it.benef)));
            const algumExclusivo = lic.itens.some(it => [1, 2, 3].includes(parseInt(it.benef)));
            if (todosExclusivos) { tipoLic = "EXCLUSIVO"; cssTipo = "badge-exclusivo"; } 
            else if (algumExclusivo) { tipoLic = "PARCIAL"; cssTipo = "badge-parcial"; }
        }

        let alertaGlobalHtml = '';
        if (["REVOGADA", "ANULADA", "SUSPENSA"].includes(lic.sit_global)) {
            alertaGlobalHtml = `<div style="color: #dc3545; font-weight: 900; font-size: 0.85rem; margin-top: 5px; text-transform: uppercase; border: 1px solid #dc3545; border-radius: 4px; padding: 2px;">⚠️ PROCESSO ${lic.sit_global}</div>`;
        }

        const compatBadge = getCompatBadgeHTML(lic.id);

        div.innerHTML = `
            <div class="header-card">
                <div>
                    <span class="badge-uf-header">${lic.uf}</span>
                    <span class="header-bold">${lic.org || '---'}</span>
                    <span class="ms-2 opacity-75 small">| Edital: ${lic.edit}</span>
                    ${compatBadge}
                </div>
                <button class="btn-excluir" onclick="excluirLicitacao('${lic.id}')">Excluir</button>
            </div>
            <div class="card-body py-3">
                <div class="row align-items-center">
                    <div class="col-md-8 border-end">
                        <small class="text-muted d-block mb-1">${lic.cid || '---'} - ${lic.unid_nome || '---'}</small>
                        <h6 class="fw-bold mb-2">${lic.obj || 'Sem descrição'}</h6>
                        <div class="d-flex gap-2 mt-2">
                            <span class="badge bg-secondary d-flex align-items-center">UASG/Código: ${lic.uasg}</span>
                            <span class="badge bg-info text-dark d-flex align-items-center">Vencimento: ${new Date(lic.dt_enc).toLocaleString('pt-BR')}</span>
                            <span class="badge-tipo ${cssTipo}">${tipoLic}</span>
                        </div>
                    </div>
                    <div class="col-md-4 text-center">
                        <small class="text-muted">VALOR ESTIMADO TOTAL</small>
                        <h5 class="fw-bold text-primary mb-0">${valorTotal}</h5>
                        ${alertaGlobalHtml}
                        <div class="mt-3 d-flex justify-content-center align-items-center gap-2">
                            <span class="badge bg-dark" style="font-size: 0.7rem;" title="Fonte da Licitação">${lic.fonte || 'PNCP Direto'}</span>
                            <button class="btn btn-sm btn-primary px-4 fw-bold" onclick="abrirItens('${lic.id}')">DETALHAR ${lic.itens.length} ITENS</button>
                        </div>
                    </div>
                </div>
            </div>`;
        container.appendChild(div);
    });

    const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
    document.getElementById('pageInfo').innerText = `Página ${currentPage}`;
}

function filtrar() {
    const dataEnc = document.getElementById('filterData').value;
    const uf = document.getElementById('filterUF').value.toUpperCase();
    const cid = document.getElementById('filterCidade').value.toUpperCase();
    const org = document.getElementById('filterOrgao').value.toUpperCase();
    const edt = document.getElementById('filterEdital').value.toUpperCase();

    filteredData = allData.filter(lic => {
        const dataLic = lic.dt_enc.split('T')[0];
        return (!dataEnc || dataLic === dataEnc) &&
               (!uf || lic.uf.includes(uf)) &&
               (!cid || (lic.cid || "").toUpperCase().includes(cid)) &&
               (!org || (lic.org || "").toUpperCase().includes(org) || (lic.uasg||"").includes(org)) &&
               (!edt || (lic.edit || "").includes(edt));
    });
    currentPage = 1;
    renderMonitor();
}

function limparFiltros() {
    document.querySelectorAll('.form-control').forEach(i => i.value = '');
    filteredData = [...allData];
    currentPage = 1;
    renderMonitor();
}

function abrirItens(id) {
    const lic = allData.find(x => x.id === id);
    document.getElementById('modalTitle').innerText = `Itens: ${lic.org} (Edital ${lic.edit})`;
    document.getElementById('linkPncp').href = lic.link;

    const grupos = {};
    const andamento = [], desertos = [], cancelados = [];

    lic.itens.forEach(it => {
        if (it.sit === "HOMOLOGADO" && it.res_forn) {
            if (!grupos[it.res_forn]) grupos[it.res_forn] = [];
            grupos[it.res_forn].push(it);
        } else if (it.sit === "CANCELADO") { cancelados.push(it); } 
        else if (it.sit === "DESERTO" || it.sit === "FRACASSADO") { desertos.push(it); } 
        else { andamento.push(it); }
    });

    let html = `<div class="table-responsive"><table class="table table-sm table-bordered table-itens align-middle"><thead class="table-dark">
        <tr><th class="text-center">#</th><th>Descrição</th><th class="text-center">ME/EPP</th><th class="text-center">Qtd/Un</th><th class="text-center">Est. Unit.</th><th class="text-center">Final Unit.</th><th class="text-center">Total</th></tr>
        </thead><tbody>`;

    if (andamento.length > 0) {
        html += `<tr><td colspan="7" class="header-status-andamento py-1 small">ITENS EM ANDAMENTO</td></tr>`;
        andamento.forEach(it => html += renderLinhaItem(it, lic.id));
    }
    if (desertos.length > 0) {
        html += `<tr><td colspan="7" class="header-status-deserto py-1 small">ITENS DESERTOS / FRACASSADOS</td></tr>`;
        desertos.forEach(it => html += renderLinhaItem(it, lic.id));
    }
    if (cancelados.length > 0) {
        html += `<tr><td colspan="7" class="header-status-cancelado py-1 small">ITENS CANCELADOS</td></tr>`;
        cancelados.forEach(it => html += renderLinhaItem(it, lic.id));
    }
    for (const forn in grupos) {
        html += `<tr class="header-fornecedor"><td colspan="7">Fornecedor: ${forn}</td></tr>`;
        grupos[forn].forEach(it => html += renderLinhaItem(it, lic.id));
    }

    html += `</tbody></table></div>`;
    document.getElementById('modalBody').innerHTML = html;
    modalObj.show();
}

// ATUALIZADO: Renderiza linha de item com destaque para compatíveis
function renderLinhaItem(it, licId) {
    const isMeEpp = [1, 2, 3].includes(parseInt(it.benef));
    const meEppHtml = isMeEpp ? '<span class="benef-sim">SIM</span>' : '<span class="benef-nao">NÃO</span>';
    const valFinal = it.res_val || 0;
    const valEstimado = it.v_est || 0;
    const valorTotal = valFinal > 0 ? (valFinal * it.q) : (valEstimado * it.q);

    // Verifica se item é compatível (mesma lógica de antes)
    let compatClass = '';
    const compat = compatData[licId];
    if (compat && compat.matches && compat.matches.length > 0) {
        const descNorm = normalizeText(it.d || '');
        const isCompat = compat.matches.some(match => {
            if (!match) return false;
            return descNorm.includes(normalizeText(match));
        });
        if (isCompat) compatClass = 'item-compativel';
    }

    return `<tr class="${compatClass}"><td class="text-center fw-bold">${it.n}</td><td>${it.d}</td><td class="text-center">${meEppHtml}</td>
            <td class="text-center">${it.q} ${it.u}</td><td class="text-center val-estimado">R$ ${valEstimado.toFixed(4)}</td>
            <td class="text-center val-homologado">${valFinal > 0 ? 'R$ ' + valFinal.toFixed(4) : '---'}</td>
            <td class="text-center fw-bold">R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td></tr>`;
}

function normalizeText(text) {
    if (!text) return '';
    return text.toUpperCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^A-Z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function excluirLicitacao(id) {
    if(confirm("Deseja remover esta licitação da visualização temporária?")) {
        allData = allData.filter(x => x.id !== id);
        filtrar();
    }
}

function abrirInclusaoManual() { 
    document.getElementById('inputLinkPncp').value = '';
    document.getElementById('inputGithubToken').value = '';
    document.getElementById('statusInclusao').innerHTML = '';
    modalInclusaoObj.show(); 
}

async function processarInclusaoManual() {
    const link = document.getElementById('inputLinkPncp').value.trim();
    const token = document.getElementById('inputGithubToken').value.trim();
    const statusDiv = document.getElementById('statusInclusao');

    if (!link || !token) {
        statusDiv.innerHTML = '<span class="text-danger">Erro: Preencha o link e o seu Token.</span>';
        return;
    }

    statusDiv.innerHTML = '<span class="text-primary">Conectando ao Repositório...</span>';

    try {
        const urlFile = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`;
        
        const resGet = await fetch(urlFile, {
            headers: { 'Authorization': `token ${token}` }
        });

        let currentContent = "";
        let sha = "";

        if (resGet.ok) {
            const dataGet = await resGet.json();
            sha = dataGet.sha;
            currentContent = decodeURIComponent(escape(atob(dataGet.content))); 
        }

        const newContent = currentContent + (currentContent.endsWith('\n') || currentContent === "" ? "" : "\n") + link + "\n";
        
        const resPut = await fetch(urlFile, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: "Inclusão manual de link via Sniper Pharma Panel",
                content: btoa(unescape(encodeURIComponent(newContent))),
                sha: sha
            })
        });

        if (resPut.ok) {
            statusDiv.innerHTML = '<span class="text-success">✅ SUCESSO! O arquivo foi atualizado. O sistema levará alguns minutos para processar os novos dados via GitHub Actions.</span>';
            setTimeout(() => modalInclusaoObj.hide(), 3000);
        } else {
            const err = await resPut.json();
            statusDiv.innerHTML = `<span class="text-danger">Erro GitHub: ${err.message}</span>`;
        }

    } catch (e) {
        statusDiv.innerHTML = `<span class="text-danger">Erro de Conexão: ${e.message}</span>`;
    }
}

document.getElementById('prevPage').onclick = () => { if(currentPage > 1) { currentPage--; renderMonitor(); window.scrollTo(0,0); } };
document.getElementById('nextPage').onclick = () => { if(currentPage * itemsPerPage < filteredData.length) { currentPage++; renderMonitor(); window.scrollTo(0,0); } };

loadData();
</script>
</body>
</html>
